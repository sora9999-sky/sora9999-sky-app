name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build Avicenna Pharmacy Desktop
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global --add safe.directory D:\a\app\app
        shell: cmd
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show repo layout (debug)
        shell: pwsh
        run: |
          Write-Host "Working dir: $PWD"
          Get-ChildItem -Force
          Write-Host "--- frontend ---"
          if (Test-Path frontend) { Get-ChildItem frontend -Force }
          Write-Host "--- desktop ---"
          if (Test-Path desktop) { Get-ChildItem desktop -Force }

      - name: Install Yarn
        shell: pwsh
        run: npm install --global yarn

      # ---------- 1. Build the React frontend ----------
      - name: Install frontend dependencies
        working-directory: frontend
        shell: pwsh
        run: yarn install --network-timeout 600000

      - name: Build frontend (relative paths for file://)
        working-directory: frontend
        shell: pwsh
        env:
          PUBLIC_URL: './'
          CI: 'false'
        run: yarn build

      # ---------- 2. Stage build inside desktop\app ----------
      - name: Copy frontend build into desktop\app
        shell: pwsh
        run: |
          $dest = "desktop/app"
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item frontend/build/* $dest -Recurse -Force
          Write-Host "Staged files:"
          Get-ChildItem $dest

      # ---------- 3. Install Electron tooling ----------
      - name: Install desktop dependencies
        working-directory: desktop
        shell: pwsh
        run: npm install --no-audit --no-fund

      # ---------- 4. Build the installer + portable ----------
      - name: Build Windows installer + portable .exe
        working-directory: desktop
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          # Disable code signing (we have no certificate)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:all

      - name: List build outputs (debug)
        shell: pwsh
        run: |
          if (Test-Path desktop/dist) {
            Get-ChildItem desktop/dist -Recurse | Select-Object FullName, Length
          } else {
            Write-Error "desktop/dist does not exist — build did not produce output"
            exit 1
          }

      # ---------- 5. Upload the .exe so you can download it ----------
      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Avicenna-Pharmacy-Windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.blockmap
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 30

      # ---------- 6. (Optional) attach .exe to a Release on tag pushes ----------
      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
